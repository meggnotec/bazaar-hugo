{{ define "main" }}
  {{ partial "hero-alt.html" (dict "title" "Your Wishlist" "badge" "Saved") }}

  <section class="section">
    <div class="container-custom">
      <!-- Empty state -->
      <div id="wishlist-empty-state" class="text-center py-16">
        <svg class="mx-auto h-20 w-20 text-surface-300 dark:text-surface-600 mb-6" fill="none" viewBox="0 0 24 24" stroke-width="1" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z" />
        </svg>
        <h2 class="text-2xl font-heading font-bold text-surface-900 dark:text-white mb-3">Your wishlist is empty</h2>
        <p class="text-surface-500 dark:text-surface-400 mb-8 max-w-md mx-auto">Save items you love to come back to them later.</p>
        <a href="/shop/" class="btn btn-primary">Browse Products</a>
      </div>

      <!-- Filled state (populated by JS) -->
      <div id="wishlist-filled-state" class="hidden">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6" id="wishlist-grid"></div>
      </div>
    </div>
  </section>

  <!-- Embed all product data for JS -->
  <script type="application/json" id="all-products-data">
    {{ .Site.Data.products | jsonify }}
  </script>
{{ end }}
