{{ define "main" }}
  {{ partial "hero-alt.html" (dict "title" "Recently Viewed" "subtitle" "Products you've looked at recently" "badge" "History") }}

  <section class="section">
    <div class="container-custom">
      <!-- Empty state -->
      <div id="rv-empty-state" class="text-center py-16">
        <svg class="mx-auto h-20 w-20 text-surface-300 dark:text-surface-600 mb-6" fill="none" viewBox="0 0 24 24" stroke-width="1" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <h2 class="text-2xl font-heading font-bold text-surface-900 dark:text-white mb-3">No recently viewed products</h2>
        <p class="text-surface-500 dark:text-surface-400 mb-8 max-w-md mx-auto">Products you view will appear here for easy access.</p>
        <a href="/shop/" class="btn btn-primary">Browse Products</a>
      </div>

      <!-- Filled state (populated by JS) -->
      <div id="rv-filled-state" class="hidden">
        <div class="flex justify-end mb-6">
          <button type="button" id="clear-rv-btn" class="text-sm font-semibold text-red-500 hover:text-red-600 transition-colors cursor-pointer">
            Clear History
          </button>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6" id="rv-grid"></div>
      </div>
    </div>
  </section>

  <!-- Embed all product data for JS -->
  <script type="application/json" id="all-products-data">
    {{ .Site.Data.products | jsonify | safeJS }}
  </script>
{{ end }}
