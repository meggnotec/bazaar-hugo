{{ define "main" }}
<section class="section">
  <div class="container-custom text-center py-20">
    <h1 class="text-[10rem] sm:text-[14rem] font-heading font-black leading-none gradient-text mb-4">404</h1>
    <h2 class="text-3xl font-heading font-bold text-surface-900 dark:text-white mb-4">Page Not Found</h2>
    <p class="text-lg text-surface-500 dark:text-surface-400 max-w-md mx-auto mb-8">
      The page you're looking for doesn't exist or has been moved. Let's get you back on track.
    </p>
    <div class="flex flex-wrap gap-3 justify-center mb-10">
      {{ range .Site.Data.categories }}
      <a href="/categories/{{ .slug }}/" class="badge-primary hover:bg-primary-200 dark:hover:bg-primary-900 transition-colors">{{ .name }}</a>
      {{ end }}
    </div>
    <a href="/" class="btn-primary">Back to Home</a>
  </div>
</section>
{{ end }}
