{{ define "main" }}
  {{ partial "hero-alt.html" (dict "title" "Our Stores" "subtitle" "Visit us at one of our locations worldwide" "badge" "Stores") }}

  <section class="section">
    <div class="container-custom">
      <!-- SVG World Map -->
      <div class="mb-16 relative">
        <div class="rounded-2xl bg-surface-50 dark:bg-surface-800 p-8 overflow-hidden">
          <svg viewBox="0 0 1000 500" xmlns="http://www.w3.org/2000/svg" class="w-full h-auto max-h-[400px]" aria-label="Store locations world map">
            <!-- Simplified world map outline -->
            <rect width="1000" height="500" fill="transparent" />
            <!-- Grid lines -->
            <g stroke="currentColor" class="text-surface-200 dark:text-surface-700" stroke-width="0.5" fill="none" opacity="0.5">
              <line x1="0" y1="125" x2="1000" y2="125" />
              <line x1="0" y1="250" x2="1000" y2="250" />
              <line x1="0" y1="375" x2="1000" y2="375" />
              <line x1="250" y1="0" x2="250" y2="500" />
              <line x1="500" y1="0" x2="500" y2="500" />
              <line x1="750" y1="0" x2="750" y2="500" />
            </g>
            <!-- Continents (simplified shapes) -->
            <g fill="currentColor" class="text-surface-200 dark:text-surface-700" opacity="0.4">
              <!-- North America -->
              <ellipse cx="220" cy="180" rx="120" ry="80" />
              <!-- South America -->
              <ellipse cx="280" cy="340" rx="60" ry="90" />
              <!-- Europe -->
              <ellipse cx="500" cy="150" rx="60" ry="50" />
              <!-- Africa -->
              <ellipse cx="510" cy="290" rx="55" ry="80" />
              <!-- Asia -->
              <ellipse cx="700" cy="180" rx="120" ry="80" />
              <!-- Australia -->
              <ellipse cx="800" cy="370" rx="50" ry="35" />
            </g>
            <!-- Store location pins -->
            {{ range .Site.Data.stores }}
            {{- /* Convert lat/lng to SVG coordinates (approximate) */ -}}
            {{- $x := add (mul (add .coordinates.lng 180) (div 1000.0 360.0)) 0 -}}
            {{- $y := sub 250 (mul .coordinates.lat (div 500.0 180.0)) -}}
            <g class="store-pin" data-city="{{ .city }}">
              <!-- Pulse ring -->
              <circle cx="{{ $x }}" cy="{{ $y }}" r="12" fill="none" stroke="#f43f5e" stroke-width="1.5" opacity="0.4">
                <animate attributeName="r" from="8" to="18" dur="2s" repeatCount="indefinite" />
                <animate attributeName="opacity" from="0.6" to="0" dur="2s" repeatCount="indefinite" />
              </circle>
              <!-- Pin dot -->
              <circle cx="{{ $x }}" cy="{{ $y }}" r="6" fill="#f43f5e" stroke="white" stroke-width="2" />
              <!-- City label -->
              <text x="{{ $x }}" y="{{ sub $y 14 }}" text-anchor="middle" fill="currentColor" class="text-surface-700 dark:text-surface-300" font-size="11" font-weight="600">{{ .city }}</text>
            </g>
            {{ end }}
          </svg>
        </div>
      </div>

      <!-- Store cards -->
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
        {{ range .Site.Data.stores }}
        <div class="card p-6">
          <div class="w-12 h-12 rounded-xl mb-4 flex items-center justify-center" style="background-color: {{ .placeholderColor }}20;">
            <svg class="h-6 w-6" style="color: {{ .placeholderColor }}" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z" />
            </svg>
          </div>
          <h3 class="font-heading font-bold text-lg text-surface-900 dark:text-white mb-1">{{ .name }}</h3>
          <p class="text-sm text-primary-500 dark:text-primary-400 font-medium mb-3">{{ .city }}</p>
          <div class="space-y-2 text-sm text-surface-600 dark:text-surface-400">
            <p class="flex items-start gap-2">
              <svg class="h-4 w-4 mt-0.5 shrink-0" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z" /></svg>
              {{ .address }}
            </p>
            <p class="flex items-start gap-2">
              <svg class="h-4 w-4 mt-0.5 shrink-0" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 002.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-.282.376-.769.542-1.21.38a12.035 12.035 0 01-7.143-7.143c-.162-.441.004-.928.38-1.21l1.293-.97c.363-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 00-1.091-.852H4.5A2.25 2.25 0 002.25 4.5v2.25z" /></svg>
              {{ .phone }}
            </p>
            <p class="flex items-start gap-2">
              <svg class="h-4 w-4 mt-0.5 shrink-0" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
              {{ .hours }}
            </p>
          </div>
        </div>
        {{ end }}
      </div>
    </div>
  </section>
{{ end }}
