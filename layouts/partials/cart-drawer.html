{{- $siteConfig := .Site.Data.site_config -}}
{{- $threshold := $siteConfig.freeShippingThreshold | default 99 -}}

<!-- Backdrop -->
<div id="cart-backdrop" class="hidden fixed inset-0 bg-black/50 z-50"></div>

<!-- Cart drawer -->
<aside id="cart-drawer" class="fixed top-0 end-0 bottom-0 w-96 max-w-[90vw] bg-white dark:bg-surface-900 z-50 transform translate-x-full transition-transform duration-300 ease-out shadow-2xl flex flex-col" data-threshold="{{ $threshold }}">
  <!-- Header -->
  <div class="flex items-center justify-between p-4 border-b border-surface-200 dark:border-surface-700">
    <h2 class="text-lg font-heading font-bold text-surface-900 dark:text-white" data-i18n="cart.yourBag">Your Bag</h2>
    <button id="cart-drawer-close" type="button" class="rounded-full p-2 text-surface-500 hover:text-surface-700 dark:hover:text-surface-300 transition-colors cursor-pointer" aria-label="Close cart">
      <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>
  </div>

  <!-- Free shipping progress bar -->
  <div id="cart-shipping-bar" class="hidden px-4 py-3 border-b border-surface-200 dark:border-surface-700">
    <div class="flex items-center justify-between text-xs mb-1.5">
      <span id="cart-shipping-msg" class="text-surface-600 dark:text-surface-400"></span>
      <span id="cart-shipping-icon" class="hidden text-emerald-500">
        <svg class="h-4 w-4 inline" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.403 12.652a3 3 0 010-5.304 3 3 0 00-3.75-3.751 3 3 0 00-5.305 0 3 3 0 00-3.751 3.75 3 3 0 000 5.305 3 3 0 003.75 3.751 3 3 0 005.305 0 3 3 0 003.751-3.75zm-2.546-4.46a.75.75 0 00-1.214-.882l-3.483 4.79-1.88-1.88a.75.75 0 10-1.06 1.061l2.5 2.5a.75.75 0 001.137-.089l4-5.5z" clip-rule="evenodd"/></svg>
      </span>
    </div>
    <div class="h-1.5 rounded-full bg-surface-200 dark:bg-surface-700 overflow-hidden">
      <div id="cart-shipping-progress" class="h-full rounded-full bg-gradient-to-r from-primary-500 to-secondary-500 transition-all duration-500" style="width: 0%"></div>
    </div>
  </div>

  <!-- Items -->
  <div id="cart-drawer-items" class="flex-1 overflow-y-auto p-4 space-y-4">
    <!-- Populated via JS -->
  </div>

  <!-- Upsells -->
  <div id="cart-upsells" class="hidden px-4 pb-3">
    <p class="text-xs font-semibold text-surface-500 dark:text-surface-400 uppercase tracking-wider mb-2">You might also like</p>
    <div id="cart-upsell-items" class="space-y-2"></div>
  </div>

  <!-- Empty state -->
  <div id="cart-drawer-empty" class="flex-1 flex flex-col items-center justify-center p-8 hidden">
    <svg class="h-16 w-16 text-surface-300 dark:text-surface-600 mb-4" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 10.5V6a3.75 3.75 0 10-7.5 0v4.5m11.356-1.993l1.263 12c.07.665-.45 1.243-1.119 1.243H4.25a1.125 1.125 0 01-1.12-1.243l1.264-12A1.125 1.125 0 015.513 7.5h12.974c.576 0 1.059.435 1.119 1.007zM8.625 10.5a.375.375 0 11-.75 0 .375.375 0 01.75 0zm7.5 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z" />
    </svg>
    <p class="text-surface-500 dark:text-surface-400 text-center mb-4" data-i18n="cart.empty">Your bag is empty</p>
    <a href="/shop" class="btn-primary text-sm" data-i18n="cart.continueShopping">Continue Shopping</a>
  </div>

  <!-- Footer -->
  <div id="cart-drawer-footer" class="border-t border-surface-200 dark:border-surface-700 p-4 space-y-3">
    <div class="flex items-center justify-between text-lg font-heading font-bold text-surface-900 dark:text-white">
      <span data-i18n="cart.subtotal">Subtotal</span>
      <span id="cart-drawer-total">$0.00</span>
    </div>
    <p class="text-xs text-surface-500 dark:text-surface-400">Shipping and taxes calculated at checkout.</p>
    <a href="/cart" class="btn-primary w-full text-center block" data-i18n="cart.viewBag">View Bag</a>
    <a href="/checkout" class="btn-outline w-full text-center block" data-i18n="cart.checkout">Checkout</a>
    <a href="/checkout-steps" class="block w-full text-center text-sm font-medium text-primary-500 hover:text-primary-600 dark:text-primary-400 dark:hover:text-primary-300 transition-colors mt-2">Multi-Step Checkout &rarr;</a>
  </div>
</aside>

<!-- Products data for cart upsells -->
<script type="application/json" id="cart-products-data">{{ .Site.Data.products | jsonify | safeJS }}</script>
