{{- /* Breadcrumbs — Navigation breadcrumb trail */ -}}
{{- $items := .items -}}
<nav class="container-custom py-4" aria-label="Breadcrumb">
  <ol class="flex items-center gap-2 text-sm text-surface-500 dark:text-surface-400">
    <li>
      <a href="/" class="hover:text-primary-500 transition-colors">Home</a>
    </li>
    {{- range $items }}
    <li class="flex items-center gap-2">
      <svg class="h-4 w-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" />
      </svg>
      {{- if .href }}
      <a href="{{ .href }}" class="hover:text-primary-500 transition-colors">{{ .label }}</a>
      {{- else }}
      <span class="text-surface-900 dark:text-white font-medium">{{ .label }}</span>
      {{- end }}
    </li>
    {{- end }}
  </ol>
</nav>
